<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=240,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="version" content="3.1.0">
<title>Soccerway R1 v3.1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── Soccerway palette ── */
:root {
  --bg:#001e28;
  --surf:#0a2a35;
  --surf2:#103442;
  --offset:#173e4f;
  --div:#1c4a5d;
  --bord:#235a70;
  --txt:#ffffff;
  --txt2:#d4dde2;
  --muted:#7a96a3;
  --faint:#4a6470;
  --orange:#ff8000;
  --orange-bright:#ff9020;
  --green:#22c55e;
  --red:#ef4444;
  --yellow:#fbbf24;
  --blue:#5591c7;
  --live:#ff4500;
  --mono:'JetBrains Mono',monospace;
  --body:'Inter',sans-serif;
  --xs:0.5625rem;--sm:0.625rem;--base:0.6875rem;--md:0.8125rem;--lg:0.9375rem;
  --r:0.25rem;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;-webkit-text-size-adjust:none}
body{font-family:var(--body);font-size:var(--base);color:var(--txt);background:var(--bg);
  height:100dvh;overflow:hidden;display:flex;flex-direction:column;max-width:240px;margin:0 auto}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit}

/* ── Header ── */
.header{display:flex;align-items:center;justify-content:space-between;padding:4px 8px;
  background:var(--bg);border-bottom:2px solid var(--orange);flex-shrink:0;min-height:24px}
.header-brand{display:flex;align-items:center;gap:5px}
.brand-mark{width:14px;height:14px;border-radius:50%;background:var(--orange);position:relative;flex-shrink:0;
  display:flex;align-items:center;justify-content:center}
.brand-mark::after{content:'';position:absolute;top:3px;left:3px;width:8px;height:8px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#fff 28%,transparent 30%),
             linear-gradient(45deg,transparent 45%,#000 45% 55%,transparent 55%);
  background-size:100% 100%}
.brand-text{font-family:var(--body);font-size:var(--sm);font-weight:700;letter-spacing:.02em;color:var(--txt)}
.brand-text span{color:var(--orange)}
.header-right{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:7px}
.live-pulse{width:6px;height:6px;border-radius:50%;background:var(--live);animation:pulse 1.2s ease-in-out infinite;box-shadow:0 0 4px var(--live)}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(0.8)}}
.live-text{color:var(--live);font-weight:700;letter-spacing:.04em}

/* ── Tabs ── */
.tabs{display:flex;background:var(--surf);border-bottom:1px solid var(--div);flex-shrink:0}
.tab{flex:1;padding:5px 4px;font-family:var(--body);font-size:var(--xs);font-weight:700;text-align:center;
  color:var(--muted);text-transform:uppercase;letter-spacing:.04em;border-bottom:2px solid transparent;
  cursor:pointer;min-height:22px;display:flex;align-items:center;justify-content:center;gap:3px;
  position:relative}
.tab.active{color:var(--orange);border-bottom-color:var(--orange)}
.tab-badge{font-family:var(--mono);font-size:7px;background:var(--orange);color:var(--bg);
  padding:1px 4px;border-radius:8px;font-weight:700;line-height:1}

/* Sub-tabs (in match/league detail) */
.subtabs{display:flex;background:var(--surf2);border-bottom:1px solid var(--div);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.subtabs::-webkit-scrollbar{display:none}
.subtab{flex:0 0 auto;padding:4px 8px;font-family:var(--mono);font-size:7px;font-weight:700;
  color:var(--muted);text-transform:uppercase;letter-spacing:.04em;border-bottom:2px solid transparent;
  cursor:pointer;white-space:nowrap}
.subtab.active{color:var(--orange);border-bottom-color:var(--orange)}

/* ── Main content ── */
.main{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.main::-webkit-scrollbar{width:3px}
.main::-webkit-scrollbar-thumb{background:var(--bord);border-radius:9px}

/* ── Soccerway-style scoreboard ── */
.sb2{padding:8px;background:linear-gradient(180deg,var(--surf2) 0%,var(--surf) 100%);border-bottom:1px solid var(--div)}
.sb2-datetime{font-family:var(--mono);font-size:7px;color:var(--muted);text-align:center;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.sb2-main{display:flex;align-items:center;gap:4px;justify-content:space-between}
.sb2-side{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;min-width:0}
.sb2-flag-big{width:40px;height:28px;border-radius:2px;overflow:hidden;background:var(--offset);display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid var(--div)}
.sb2-flag-big img{width:100%;height:100%;object-fit:cover}
.sb2-team-name{font-family:var(--body);font-size:var(--xs);font-weight:700;color:var(--txt);text-align:center;line-height:1.1;text-transform:uppercase}
.sb2-team-rank{font-family:var(--mono);font-size:7px;color:var(--muted);letter-spacing:.04em}
.sb2-center{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;min-width:60px;padding:0 4px}
.sb2-score{font-family:var(--mono);font-size:1.5rem;font-weight:700;color:var(--orange);line-height:1;letter-spacing:.05em}
.sb2-score.sched{color:var(--muted);font-size:1.1rem}
.sb2-stage{font-family:var(--mono);font-size:7px;font-weight:700;color:var(--live);text-align:center;line-height:1.2;text-transform:uppercase;letter-spacing:.04em}
.sb2-stage.ft{color:var(--muted)}
.sb2-stage.sched{color:var(--txt2)}
.sb2-clock{font-family:var(--mono);font-size:7px;color:var(--live);font-weight:700}

/* ── Stats section (Soccerway-style) ── */
.stats2-section{margin-top:4px}
.stats2-section-header{display:flex;align-items:center;justify-content:center;padding:5px 0;font-family:var(--body);font-size:7px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--div)}
.stats2-row{padding:4px 8px;border-bottom:1px solid color-mix(in oklch,var(--div) 30%,transparent)}
.stats2-row:last-child{border-bottom:none}
.stats2-row-top{display:flex;justify-content:space-between;align-items:flex-start;font-family:var(--body);font-size:var(--xs);margin-bottom:3px;gap:4px}
.stats2-val-side{flex:0 0 auto;text-align:left;color:var(--txt);font-weight:600;font-family:var(--mono);font-size:var(--sm);min-width:34px}
.stats2-val-side.right{text-align:right}
.stats2-val-side .sub{display:block;font-size:7px;color:var(--muted);font-weight:400}
.stats2-label{flex:1;text-align:center;color:var(--txt2);font-weight:500;font-size:var(--xs)}
.stats2-bars{display:flex;height:4px;gap:0;background:#1c2d35;border-radius:1px;overflow:hidden}
.stats2-bar-left{height:100%;background:var(--orange);margin-left:auto;border-radius:1px}
.stats2-bar-right{height:100%;background:var(--orange-bright);border-radius:1px}
.stats2-bar-left.dim{background:#5a5a5a}
.stats2-bar-right.dim{background:var(--orange)}

/* ── Soccerway-style match list (grouped by competition) ── */
.comp-group{margin-bottom:2px}
.comp-header{display:flex;align-items:center;justify-content:space-between;padding:3px 6px;
  background:var(--surf2);border-bottom:1px solid var(--div);font-family:var(--body);font-size:var(--xs);
  font-weight:700;color:var(--orange-bright);text-transform:uppercase;letter-spacing:.04em;min-height:18px}
.comp-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.comp-region{font-size:7px;color:var(--muted);font-weight:500}

.match-row{display:flex;align-items:center;padding:3px 6px;border-bottom:1px solid color-mix(in oklch,var(--div) 50%,transparent);
  cursor:pointer;gap:5px;background:var(--surf);transition:background .12s;min-height:32px}
.match-row.focused{background:var(--offset);box-shadow:inset 2px 0 0 var(--orange)}
.match-row:hover{background:var(--surf2)}

.match-time{font-family:var(--mono);font-size:var(--xs);font-weight:700;width:30px;text-align:center;flex-shrink:0;line-height:1.2}
.match-time.live{color:var(--live);animation:pulse-text 1.5s ease-in-out infinite}
.match-time.ft{color:var(--muted)}
.match-time.sched{color:var(--txt2)}
.match-time.ht{color:var(--yellow)}
@keyframes pulse-text{0%,100%{opacity:1}50%{opacity:.5}}

.match-teams{flex:1;min-width:0;display:flex;flex-direction:column;gap:1px}
.team-line{display:flex;align-items:center;gap:4px;font-family:var(--body);font-size:var(--sm);min-width:0}
.team-flag-sm{width:10px;height:10px;border-radius:1px;background:var(--offset);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:6px}
.team-flag-sm img{width:100%;height:100%;object-fit:cover}
.team-name-sm{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--txt2);font-weight:500}
.team-line.winner .team-name-sm{color:var(--txt);font-weight:600}
.team-line.loser .team-name-sm{color:var(--muted)}

.match-scores{font-family:var(--mono);font-size:var(--sm);font-weight:700;display:flex;flex-direction:column;gap:1px;text-align:right;min-width:12px}
.score-cell{color:var(--txt2);min-width:12px;height:14px;line-height:14px}
.score-cell.winner{color:var(--txt)}
.score-cell.live{color:var(--live)}

.match-status-icon{width:8px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:1px;font-size:7px;color:var(--muted)}

/* Empty/loading */
.empty,.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:20px 12px;gap:8px;text-align:center;min-height:160px}
.empty-icon{font-size:32px;opacity:.4}
.empty-title{font-family:var(--body);font-size:var(--sm);color:var(--txt2);font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.empty-sub{font-family:var(--mono);font-size:var(--xs);color:var(--muted);max-width:200px;line-height:1.5}
.spinner-ball{width:24px;height:24px;border-radius:50%;background:var(--orange);
  border:2px solid var(--orange);animation:spin 1s linear infinite;position:relative;overflow:hidden}
.spinner-ball::before{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;
  border-radius:50%;background:radial-gradient(circle at 35% 35%,#fff 35%,transparent 38%),
  linear-gradient(45deg,transparent 45%,#000 45% 55%,transparent 55%)}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

/* ── Match Detail — Scoreboard ── */
.detail-back{display:flex;align-items:center;gap:5px;padding:4px 8px;background:var(--surf);
  border-bottom:1px solid var(--div);font-family:var(--mono);font-size:var(--xs);color:var(--orange);
  font-weight:700;cursor:pointer;min-height:22px;text-transform:uppercase;letter-spacing:.04em}
.detail-back:hover{background:var(--surf2)}

.scoreboard{background:linear-gradient(180deg,var(--surf2) 0%,var(--surf) 100%);padding:6px 8px;
  border-bottom:1px solid var(--div)}
.sb-comp{font-family:var(--mono);font-size:7px;color:var(--orange-bright);text-transform:uppercase;
  text-align:center;letter-spacing:.06em;font-weight:700;margin-bottom:2px}
.sb-row{display:flex;align-items:center;justify-content:center;gap:4px;padding:1px 0}
.sb-team{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:0}
.sb-flag{width:22px;height:22px;border-radius:50%;background:var(--offset);overflow:hidden;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px}
.sb-flag img{width:100%;height:100%;object-fit:cover}
.sb-name{font-family:var(--body);font-size:var(--xs);font-weight:700;color:var(--txt);text-align:center;
  line-height:1.1;max-width:64px}
.sb-score-block{font-family:var(--mono);font-size:var(--lg);font-weight:700;color:var(--orange);
  padding:0 4px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:38px}
.sb-score-num{font-size:1.25rem;line-height:1}
.sb-vs{font-family:var(--mono);font-size:var(--sm);color:var(--muted);font-weight:600}
.sb-status{text-align:center;font-family:var(--mono);font-size:var(--xs);font-weight:700;margin-top:3px;
  text-transform:uppercase;letter-spacing:.04em}
.sb-status.live{color:var(--live)}
.sb-status.ft{color:var(--muted)}
.sb-status.sched{color:var(--txt2)}

/* ── Events timeline ── */
.events-list{padding:2px 0}
.event-row{display:flex;align-items:center;gap:4px;padding:3px 6px;border-bottom:1px solid color-mix(in oklch,var(--div) 40%,transparent);
  font-family:var(--body);font-size:var(--xs)}
.event-min{font-family:var(--mono);font-size:7px;font-weight:700;color:var(--muted);min-width:22px;text-align:right;flex-shrink:0}
.event-icon{width:12px;height:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;border-radius:2px}
.event-icon.goal{background:var(--green);color:#000}
.event-icon.yellow{background:var(--yellow);color:#000}
.event-icon.red{background:var(--red);color:#fff}
.event-icon.sub{background:var(--blue);color:#fff;font-size:7px}
.event-icon.var{background:var(--orange);color:#000;font-size:7px}
.event-text{flex:1;color:var(--txt2);line-height:1.3;min-width:0}
.event-text .player{color:var(--txt);font-weight:600}
.event-side{font-family:var(--mono);font-size:7px;color:var(--muted);min-width:18px;text-align:right;flex-shrink:0;text-transform:uppercase}

/* ── Stats comparison ── */
.stats-list{padding:4px 8px}
.stat-row{margin-bottom:5px;font-family:var(--body);font-size:var(--xs)}
.stat-row-vals{display:flex;justify-content:space-between;color:var(--txt);font-weight:700;font-family:var(--mono);font-size:var(--sm);margin-bottom:2px}
.stat-row-label{text-align:center;color:var(--muted);text-transform:uppercase;font-size:7px;font-weight:600;letter-spacing:.04em;margin-bottom:3px}
.stat-row-bars{display:flex;gap:2px;height:4px;background:transparent}
.stat-bar-left,.stat-bar-right{height:100%;background:var(--orange);border-radius:1px;transition:width .3s}
.stat-bar-left{margin-left:auto}
.stat-bar-right{background:var(--blue)}

/* ── Lineup ── */
.lineup-section{padding:4px}
.lineup-team{margin-bottom:6px}
.lineup-team-header{display:flex;align-items:center;gap:5px;padding:3px 6px;background:var(--surf2);border-radius:var(--r);margin-bottom:3px;font-family:var(--mono);font-size:7px;font-weight:700;color:var(--orange-bright);text-transform:uppercase;letter-spacing:.04em}
.lineup-team-header .formation{margin-left:auto;color:var(--muted)}
.lineup-players{display:flex;flex-direction:column;gap:1px}
.lineup-player{display:flex;align-items:center;gap:4px;padding:2px 6px;font-family:var(--body);font-size:var(--xs)}
.lineup-player-num{font-family:var(--mono);font-weight:700;color:var(--orange);width:14px;text-align:right;flex-shrink:0}
.lineup-player-name{flex:1;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lineup-player-pos{font-family:var(--mono);font-size:7px;color:var(--muted);text-transform:uppercase;flex-shrink:0}
.lineup-divider{display:flex;align-items:center;gap:4px;padding:3px 6px;font-family:var(--mono);font-size:7px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.lineup-divider::before,.lineup-divider::after{content:'';flex:1;height:1px;background:var(--div)}

/* ── Match info ── */
.info-list{padding:4px 8px}
.info-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid color-mix(in oklch,var(--div) 40%,transparent);font-family:var(--body);font-size:var(--xs)}
.info-row:last-child{border-bottom:none}
.info-label{color:var(--muted);text-transform:uppercase;font-size:7px;font-weight:700;letter-spacing:.04em;font-family:var(--mono)}
.info-val{color:var(--txt);font-weight:600;text-align:right;font-family:var(--mono)}

/* ── Standings table ── */
.standings-table{padding:0 4px;font-family:var(--mono);font-size:var(--xs)}
.standings-row{display:grid;grid-template-columns:14px 1fr 18px 18px 22px;gap:3px;align-items:center;padding:2px 4px;
  border-bottom:1px solid color-mix(in oklch,var(--div) 40%,transparent)}
.standings-row.header{font-weight:700;color:var(--muted);text-transform:uppercase;font-size:7px;background:var(--surf2);border-radius:var(--r);padding:3px 4px}
.standings-row .rank{color:var(--orange);font-weight:700;text-align:center}
.standings-row .team{color:var(--txt2);font-weight:500;font-family:var(--body);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.standings-row .gp,.standings-row .gd{color:var(--muted);text-align:right}
.standings-row .pts{color:var(--txt);font-weight:700;text-align:right}

/* ── Competitions grid ── */
.comp-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px;padding:4px}
.comp-card{background:var(--surf);border:1px solid var(--div);border-radius:var(--r);padding:6px 4px;
  text-align:center;cursor:pointer;transition:all .12s;display:flex;flex-direction:column;gap:2px;
  min-height:46px;align-items:center;justify-content:center}
.comp-card.focused{border-color:var(--orange);box-shadow:0 0 0 1px var(--orange);background:var(--surf2)}
.comp-card-name{font-family:var(--body);font-size:var(--xs);font-weight:700;color:var(--txt);line-height:1.2}
.comp-card-region{font-family:var(--mono);font-size:7px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.comp-card-live{position:absolute;top:2px;right:2px;background:var(--live);color:#fff;font-family:var(--mono);font-size:6px;font-weight:700;padding:1px 3px;border-radius:6px}

/* ── Footer ── */
.footer{display:flex;align-items:center;justify-content:space-between;padding:2px 8px;
  background:var(--bg);border-top:1px solid var(--orange);flex-shrink:0;min-height:16px;font-family:var(--mono);font-size:7px}
.footer-left{color:var(--muted)}
.footer-mid{flex:1;text-align:center;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 4px}
.footer-right{color:var(--orange);display:flex;align-items:center;gap:3px;font-weight:700}

/* ── Hint ── */
.prompt{padding:3px 8px;text-align:center;font-family:var(--mono);font-size:7px;color:var(--muted);background:var(--surf);border-top:1px solid var(--div);flex-shrink:0;letter-spacing:.04em}
.prompt span.k{color:var(--orange);font-weight:700}
</style>
</head>
<body>

<header class="header">
  <div class="header-brand">
    <div class="brand-mark"></div>
    <div class="brand-text">SOCCER<span>WAY</span></div>
  </div>
  <div class="header-right">
    <span class="live-pulse" id="livePulse"></span>
    <span class="live-text" id="liveCount">—</span>
  </div>
</header>

<nav class="tabs" id="tabs"></nav>
<nav class="subtabs" id="subtabs" style="display:none"></nav>

<main class="main" id="main"></main>

<div class="prompt">
  <span class="k">SCROLL</span> · <span class="k">PTT</span> open · LONG refresh
</div>

<footer class="footer">
  <span class="footer-left" id="footerLeft">v3.1</span>
  <span class="footer-mid" id="footerMid">Loading…</span>
  <span class="footer-right"><span id="countdown">30s</span></span>
</footer>

<script>
/* ══════════════════════════════════════
   Soccerway R1 v3 — Native Soccerway-style scores via ESPN API
   ══════════════════════════════════════ */

const API = 'https://site.api.espn.com/apis/site/v2/sports/soccer';

const LEAGUES = [
  {slug:'fifa.world',           name:'World Cup',     region:'FIFA'},
  {slug:'fifa.cwc',             name:'Club WC',       region:'FIFA'},
  {slug:'fifa.confederations',  name:'Confed Cup',    region:'FIFA'},
  {slug:'fifa.womens.world',    name:'W. World Cup',  region:'FIFA'},
  {slug:'uefa.champions',       name:'UCL',           region:'UEFA'},
  {slug:'uefa.europa',          name:'UEL',           region:'UEFA'},
  {slug:'uefa.euro',            name:'Euros',         region:'UEFA'},
  {slug:'uefa.nations',         name:'Nations',       region:'UEFA'},
  {slug:'conmebol.copa_america',name:'Copa America',  region:'CONMEBOL'},
  {slug:'concacaf.gold',        name:'Gold Cup',      region:'CONCACAF'},
  {slug:'eng.1',                name:'Premier',       region:'England'},
  {slug:'eng.fa',               name:'FA Cup',        region:'England'},
  {slug:'eng.league_cup',       name:'Carabao',       region:'England'},
  {slug:'esp.1',                name:'La Liga',       region:'Spain'},
  {slug:'ita.1',                name:'Serie A',       region:'Italy'},
  {slug:'ger.1',                name:'Bundesliga',    region:'Germany'},
  {slug:'fra.1',                name:'Ligue 1',       region:'France'},
  {slug:'usa.1',                name:'MLS',           region:'USA'},
  {slug:'usa.nwsl',             name:'NWSL',          region:'USA'},
  {slug:'mex.1',                name:'Liga MX',       region:'Mexico'},
  {slug:'bra.1',                name:'Brasileirão',   region:'Brazil'},
  {slug:'arg.1',                name:'Primera',       region:'Argentina'}
];

const TABS = [
  {id:'live',  label:'LIVE'},
  {id:'today', label:'TODAY'},
  {id:'comps', label:'COMPS'}
];

const MATCH_SUBTABS = [
  {id:'summary',  label:'SUMMARY'},
  {id:'stats',    label:'STATS'},
  {id:'lineup',   label:'LINEUP'},
  {id:'info',     label:'INFO'}
];

const COMP_SUBTABS = [
  {id:'matches',  label:'MATCHES'},
  {id:'table',    label:'TABLE'}
];

let S = {
  tabIdx: 0,
  matches: [],
  loading: true,
  focusIdx: -1,
  view: 'list', // list | matchDetail | compList | compDetail
  selectedMatch: null,
  selectedComp: null,
  matchDetail: null,
  matchSubTab: 0,
  compSubTab: 0,
  countdown: 30,
  countdownTimer: null,
  refreshing: false,
  compStandings: null
};

const $ = id => document.getElementById(id);

/* ══════════════════════════════════════
   FETCH
   ══════════════════════════════════════ */

async function fetchLeague(slug) {
  try {
    const r = await fetch(`${API}/${slug}/scoreboard`);
    if (!r.ok) return [];
    const data = await r.json();
    const meta = LEAGUES.find(l => l.slug === slug);
    return (data.events || []).map(ev => parseEvent(ev, slug, meta));
  } catch(e) { return []; }
}

function parseEvent(ev, slug, meta) {
  const comp = (ev.competitions || [{}])[0];
  const status = comp.status?.type || {};
  const teams = comp.competitors || [];
  const home = teams.find(t => t.homeAway === 'home') || teams[0] || {};
  const away = teams.find(t => t.homeAway === 'away') || teams[1] || {};
  return {
    id: ev.id,
    leagueSlug: slug,
    leagueName: meta?.name || slug,
    leagueRegion: meta?.region || '',
    startISO: comp.date || ev.date,
    venue: comp.venue?.fullName,
    status: status.state,
    statusDetail: status.shortDetail || '',
    statusDesc: status.description || '',
    completed: status.completed,
    clock: comp.status?.displayClock,
    period: comp.status?.period,
    home: parseTeam(home),
    away: parseTeam(away)
  };
}

function parseTeam(t) {
  const team = t.team || {};
  return {
    id: t.id,
    teamId: team.id,
    name: team.shortDisplayName || team.displayName || '?',
    full: team.displayName || '',
    abbr: team.abbreviation || '',
    score: t.score || '0',
    logo: team.logo,
    winner: t.winner
  };
}

async function fetchAllMatches() {
  S.loading = true;
  S.refreshing = true;
  updateFooter();
  if (S.matches.length === 0) render();

  const results = await Promise.all(LEAGUES.map(l => fetchLeague(l.slug)));
  S.matches = results.flat();
  S.matches.sort((a, b) => {
    const order = {in:0, pre:1, post:2};
    const d = (order[a.status] ?? 3) - (order[b.status] ?? 3);
    if (d !== 0) return d;
    return new Date(a.startISO) - new Date(b.startISO);
  });

  S.loading = false;
  S.refreshing = false;
  updateLiveCount();
  resetCountdown();
  render();
}

async function fetchMatchDetail(match) {
  try {
    const url = `${API}/${match.leagueSlug}/summary?event=${match.id}`;
    const r = await fetch(url);
    if (!r.ok) return null;
    return await r.json();
  } catch(e) { return null; }
}

async function fetchStandings(slug) {
  try {
    const r = await fetch(`${API}/${slug}/standings`);
    if (!r.ok) return null;
    return await r.json();
  } catch(e) { return null; }
}

function updateLiveCount() {
  const c = S.matches.filter(m => m.status === 'in').length;
  $('liveCount').textContent = c > 0 ? `${c} LIVE` : 'NO LIVE';
  $('livePulse').style.opacity = c > 0 ? '1' : '0.2';
}

function updateFooter() {
  const tabId = TABS[S.tabIdx].id;
  let count = 0, label = '';
  if (S.refreshing) label = 'Refreshing…';
  else if (S.loading) label = 'Loading…';
  else {
    if (tabId === 'live')  count = S.matches.filter(m => m.status === 'in').length;
    else if (tabId === 'today') count = S.matches.length;
    else if (tabId === 'comps') count = LEAGUES.length;
    label = `${count} ${tabId === 'comps' ? 'competitions' : 'matches'}`;
  }
  $('footerMid').textContent = label;
}

function resetCountdown() {
  clearInterval(S.countdownTimer);
  S.countdown = 30;
  $('countdown').textContent = S.countdown + 's';
  S.countdownTimer = setInterval(() => {
    S.countdown--;
    $('countdown').textContent = S.countdown + 's';
    if (S.countdown <= 0) {
      clearInterval(S.countdownTimer);
      fetchAllMatches();
    }
  }, 1000);
}

/* ══════════════════════════════════════
   RENDER — Tabs
   ══════════════════════════════════════ */

function renderTabs() {
  const liveC = S.matches.filter(m => m.status === 'in').length;
  $('tabs').innerHTML = TABS.map((t, i) => {
    const showBadge = t.id === 'live' && liveC > 0;
    return `<div class="tab${i === S.tabIdx ? ' active' : ''}" data-i="${i}">
      ${t.label}${showBadge ? `<span class="tab-badge">${liveC}</span>` : ''}
    </div>`;
  }).join('');
  document.querySelectorAll('.tabs .tab').forEach(t => {
    t.addEventListener('click', () => switchTab(parseInt(t.dataset.i)));
  });
}

function renderSubTabs(items, activeIdx, onChange) {
  const el = $('subtabs');
  el.style.display = 'flex';
  el.innerHTML = items.map((t, i) => `
    <div class="subtab${i === activeIdx ? ' active' : ''}" data-i="${i}">${t.label}</div>`).join('');
  el.querySelectorAll('.subtab').forEach(st => {
    st.addEventListener('click', () => onChange(parseInt(st.dataset.i)));
  });
}

function hideSubTabs() { $('subtabs').style.display = 'none'; $('subtabs').innerHTML = ''; }

function switchTab(idx) {
  S.tabIdx = idx;
  S.focusIdx = -1;
  S.view = TABS[idx].id === 'comps' ? 'compList' : 'list';
  render();
  $('main').scrollTop = 0;
}

/* ══════════════════════════════════════
   RENDER — Match List (Soccerway-style)
   ══════════════════════════════════════ */

function formatTime(iso) {
  if (!iso) return '';
  try {
    return new Date(iso).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:false}).replace(/^0/,'');
  } catch(e) { return ''; }
}

function statusText(m) {
  if (m.status === 'in') {
    if (m.statusDesc === 'Halftime') return 'HT';
    if (m.clock) return (m.clock || '').replace("'", '') + "'";
    return 'LIVE';
  }
  if (m.status === 'post') {
    if (m.statusDetail && (m.statusDetail.includes('AET') || m.statusDetail.includes('Pen'))) {
      return m.statusDetail.substring(0, 5);
    }
    return 'FT';
  }
  return formatTime(m.startISO);
}

function statusClass(m) {
  if (m.status === 'in') return m.statusDesc === 'Halftime' ? 'ht' : 'live';
  if (m.status === 'post') return 'ft';
  return 'sched';
}

function teamFlag(team, size='sm') {
  return team.logo
    ? `<img src="${team.logo}" alt="" loading="lazy" onerror="this.style.display='none'"/>`
    : '⚽';
}

function matchRow(m, idx) {
  const sCls = statusClass(m);
  const sTxt = statusText(m);
  const showScore = m.status !== 'pre';
  const aWin = m.away.winner, hWin = m.home.winner;
  const aLose = m.status === 'post' && !aWin && hWin;
  const hLose = m.status === 'post' && !hWin && aWin;
  return `<div class="match-row${idx === S.focusIdx ? ' focused' : ''}" data-idx="${idx}">
    <div class="match-time ${sCls}">${sTxt}</div>
    <div class="match-teams">
      <div class="team-line${aWin ? ' winner' : ''}${aLose ? ' loser' : ''}">
        <div class="team-flag-sm">${teamFlag(m.away)}</div>
        <div class="team-name-sm">${m.away.name}</div>
      </div>
      <div class="team-line${hWin ? ' winner' : ''}${hLose ? ' loser' : ''}">
        <div class="team-flag-sm">${teamFlag(m.home)}</div>
        <div class="team-name-sm">${m.home.name}</div>
      </div>
    </div>
    <div class="match-scores">
      <div class="score-cell${aWin ? ' winner' : ''}${m.status==='in' ? ' live' : ''}">${showScore ? m.away.score : '-'}</div>
      <div class="score-cell${hWin ? ' winner' : ''}${m.status==='in' ? ' live' : ''}">${showScore ? m.home.score : '-'}</div>
    </div>
  </div>`;
}

function groupedMatchList(list, includeCompHeader = true) {
  if (!includeCompHeader) {
    return list.map((m,i) => matchRow(m, i)).join('');
  }
  // Group by competition
  const groups = {};
  list.forEach((m, idx) => {
    const key = m.leagueSlug;
    if (!groups[key]) groups[key] = { name: m.leagueName, region: m.leagueRegion, items: [] };
    groups[key].items.push({...m, _idx: idx});
  });
  return Object.values(groups).map(g => `
    <div class="comp-group">
      <div class="comp-header">
        <div class="comp-name">${g.name}</div>
        <div class="comp-region">${g.region}</div>
      </div>
      ${g.items.map(m => matchRow(m, m._idx)).join('')}
    </div>`).join('');
}

/* ══════════════════════════════════════
   RENDER — Views
   ══════════════════════════════════════ */

function render() {
  renderTabs();
  updateFooter();
  $('footerLeft').textContent = 'v3.1';

  if (S.loading && S.matches.length === 0) {
    hideSubTabs();
    $('main').innerHTML = `
      <div class="loading-state">
        <div class="spinner-ball"></div>
        <div class="empty-title">Loading scores</div>
        <div class="empty-sub">Fetching from ${LEAGUES.length} competitions…</div>
      </div>`;
    return;
  }

  if (S.view === 'matchDetail')   { renderMatchDetail(); return; }
  if (S.view === 'compList')      { renderCompList(); return; }
  if (S.view === 'compDetail')    { renderCompDetail(); return; }

  hideSubTabs();
  let list = [];
  if (S.tabIdx === 0)      list = S.matches.filter(x => x.status === 'in');
  else if (S.tabIdx === 1) list = S.matches;

  if (list.length === 0) {
    $('main').innerHTML = `
      <div class="empty">
        <div class="empty-icon">⚽</div>
        <div class="empty-title">No ${TABS[S.tabIdx].label.toLowerCase()} matches</div>
        <div class="empty-sub">${S.tabIdx === 0 ? "Nothing's kicking off right now." : 'No matches across the leagues we track today.'}</div>
      </div>`;
    return;
  }

  $('main').innerHTML = groupedMatchList(list);
  document.querySelectorAll('.match-row').forEach(row => {
    row.addEventListener('click', () => openMatchDetail(list[parseInt(row.dataset.idx)]));
  });

  if (S.focusIdx < 0 && list.length > 0) S.focusIdx = 0;
  applyFocus();
}

function applyFocus() {
  const rows = document.querySelectorAll('.match-row');
  rows.forEach((r, i) => r.classList.toggle('focused', parseInt(r.dataset.idx) === S.focusIdx));
}

/* ── Match detail ── */

async function openMatchDetail(match) {
  S.selectedMatch = match;
  S._prevView = S.view;
  S.view = 'matchDetail';
  S.matchSubTab = 0;
  S.matchDetail = null;
  render();
  S.matchDetail = await fetchMatchDetail(match);
  if (S.view === 'matchDetail') render();
}

function renderMatchDetail() {
  const m = S.selectedMatch;
  if (!m) { goBack(); return; }
  renderSubTabs(MATCH_SUBTABS, S.matchSubTab, (i) => { S.matchSubTab = i; render(); $('main').scrollTop = 0; });

  const detail = S.matchDetail;
  const sCls = statusClass(m);
  const sTxt = m.statusDetail || statusText(m);

  // Soccerway-style scoreboard with date, big flags, big score, stage label
  const matchDate = (() => {
    if (!m.startISO) return '';
    try {
      const d = new Date(m.startISO);
      const time = d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
      const date = d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
      return `${time}, ${date}`;
    } catch(e) { return ''; }
  })();
  // Determine stage text and clock for live matches
  let stageText = '';
  let clockText = '';
  if (m.status === 'in') {
    if (m.statusDesc === 'Halftime') stageText = 'HALFTIME';
    else if (m.period === 1) stageText = '1ST HALF';
    else if (m.period === 2) stageText = '2ND HALF';
    else if (m.period >= 3) stageText = 'EXTRA TIME';
    else stageText = 'LIVE';
    if (m.clock) clockText = m.clock.replace("'",'');
  } else if (m.status === 'post') {
    stageText = m.statusDetail || 'FULL TIME';
  } else {
    stageText = m.statusDetail || 'KICKOFF SOON';
  }

  let html = `
    <div class="detail-back" id="backBtn">◀ ${m.leagueName.toUpperCase()}</div>
    <div class="sb2">
      ${matchDate ? `<div class="sb2-datetime">${matchDate}</div>` : ''}
      <div class="sb2-main">
        <div class="sb2-side">
          <div class="sb2-flag-big">${teamFlag(m.away)}</div>
          <div class="sb2-team-name">${m.away.name}</div>
        </div>
        <div class="sb2-center">
          <div class="sb2-score${m.status==='pre'?' sched':''}">${m.status === 'pre' ? '-' : m.away.score} - ${m.status === 'pre' ? '-' : m.home.score}</div>
          <div class="sb2-stage ${sCls}">${stageText}${clockText ? ` · ${clockText}` : ''}</div>
        </div>
        <div class="sb2-side">
          <div class="sb2-flag-big">${teamFlag(m.home)}</div>
          <div class="sb2-team-name">${m.home.name}</div>
        </div>
      </div>
    </div>`;

  // Sub-tab content
  const tab = MATCH_SUBTABS[S.matchSubTab].id;
  if (tab === 'summary')      html += renderEvents(detail, m);
  else if (tab === 'stats')   html += renderStats(detail, m);
  else if (tab === 'lineup')  html += renderLineups(detail, m);
  else if (tab === 'info')    html += renderInfo(detail, m);

  $('main').innerHTML = html;
  $('backBtn').addEventListener('click', goBack);
}

function renderEvents(detail, m) {
  if (!detail) return loadingFragment('Loading events…');
  const events = detail.keyEvents || [];
  if (events.length === 0) {
    return `<div class="empty" style="min-height:80px">
      <div class="empty-sub">No events yet. ${m.status === 'pre' ? "Match hasn't started." : 'Check back during play.'}</div>
    </div>`;
  }
  const eventIcon = (ev) => {
    const t = (ev.type?.id || '').toString();
    const txt = (ev.type?.text || '').toLowerCase();
    if (txt.includes('goal') || t === '70' || t === '98' || t === '173')
      return {cls:'goal', sym:'⚽'};
    if (txt.includes('yellow card')) return {cls:'yellow', sym:'■'};
    if (txt.includes('red card')) return {cls:'red', sym:'■'};
    if (txt.includes('substitution')) return {cls:'sub', sym:'⇄'};
    if (txt.includes('var') || txt.includes('penalty')) return {cls:'var', sym:'V'};
    return {cls:'sub', sym:'·'};
  };
  return `<div class="events-list">
    ${events.map(ev => {
      const ic = eventIcon(ev);
      const team = ev.team?.id;
      const side = team == m.away.teamId ? 'AWAY' : team == m.home.teamId ? 'HOME' : '';
      const clock = ev.clock?.displayValue || '';
      return `<div class="event-row">
        <div class="event-min">${clock}</div>
        <div class="event-icon ${ic.cls}">${ic.sym}</div>
        <div class="event-text">${ev.text || ev.type?.text || '—'}</div>
        <div class="event-side">${side}</div>
      </div>`;
    }).join('')}
  </div>`;
}

/* ── Soccerway-style stats with sections ── */
const STAT_SECTIONS = [
  { name: 'TOP STATS', rows: [
    { label: 'Ball possession',    key: 'possessionPct',  pct: true },
    { label: 'Total shots',        key: 'totalShots' },
    { label: 'Shots on target',    key: 'shotsOnTarget' },
    { label: 'Corner kicks',       key: 'wonCorners' },
    { label: 'Passes',             key: 'passPct', pct: true, sub: ['accuratePasses','totalPasses'] },
    { label: 'Yellow cards',       key: 'yellowCards' }
  ]},
  { name: 'SHOTS', rows: [
    { label: 'Total shots',        key: 'totalShots' },
    { label: 'Shots on target',    key: 'shotsOnTarget' },
    { label: 'Shot accuracy',      key: 'shotPct', pct: true },
    { label: 'Blocked shots',      key: 'blockedShots' },
    { label: 'Saves',              key: 'saves' }
  ]},
  { name: 'ATTACK', rows: [
    { label: 'Corner kicks',       key: 'wonCorners' },
    { label: 'Offsides',           key: 'offsides' },
    { label: 'Penalty kicks',      key: 'penaltyKickShots' },
    { label: 'Penalty goals',      key: 'penaltyKickGoals' }
  ]},
  { name: 'PASSES', rows: [
    { label: 'Passes',             key: 'passPct',     pct: true, sub: ['accuratePasses','totalPasses'] },
    { label: 'Long balls',         key: 'longballPct', pct: true, sub: ['accurateLongBalls','totalLongBalls'] },
    { label: 'Crosses',            key: 'crossPct',    pct: true, sub: ['accurateCrosses','totalCrosses'] }
  ]},
  { name: 'DEFENSE', rows: [
    { label: 'Fouls',              key: 'foulsCommitted' },
    { label: 'Tackles',            key: 'tacklePct',   pct: true, sub: ['effectiveTackles','totalTackles'] },
    { label: 'Interceptions',      key: 'interceptions' },
    { label: 'Clearances',         key: 'totalClearance' },
    { label: 'Yellow cards',       key: 'yellowCards' },
    { label: 'Red cards',          key: 'redCards' }
  ]}
];

function renderStats(detail, m) {
  if (!detail) return loadingFragment('Loading stats…');
  const teams = detail.boxscore?.teams || [];
  if (teams.length < 2) {
    return `<div class="empty" style="min-height:80px">
      <div class="empty-sub">Stats appear after kickoff.</div>
    </div>`;
  }
  // Build stat map keyed by `name` for each side
  function buildStatMap(stats) {
    const map = {};
    (stats || []).forEach(s => { map[s.name] = s; });
    return map;
  }
  const homeIdx = teams[0].homeAway === 'home' ? 0 : 1;
  const awayIdx = 1 - homeIdx;
  const homeMap = buildStatMap(teams[homeIdx].statistics);
  const awayMap = buildStatMap(teams[awayIdx].statistics);

  function formatVal(stat, isPct) {
    if (!stat) return '-';
    let v = stat.displayValue;
    if (isPct) {
      const num = parseFloat(v);
      if (!isNaN(num)) {
        // ESPN reports as either 0-1 or 0-100 already
        const pct = num <= 1 ? Math.round(num * 100) : Math.round(num);
        return pct + '%';
      }
    }
    return v ?? '-';
  }

  function rawNum(stat, isPct) {
    if (!stat) return 0;
    const n = parseFloat(stat.value ?? stat.displayValue);
    if (isNaN(n)) return 0;
    if (isPct) return n <= 1 ? n * 100 : n;
    return n;
  }

  function statRow(row) {
    const aStat = awayMap[row.key];
    const hStat = homeMap[row.key];
    if (!aStat && !hStat) return ''; // skip if neither has it
    const aDisp = formatVal(aStat, row.pct);
    const hDisp = formatVal(hStat, row.pct);
    let aSub = '', hSub = '';
    if (row.sub && row.sub.length === 2) {
      const aNum = awayMap[row.sub[0]]?.displayValue;
      const aDen = awayMap[row.sub[1]]?.displayValue;
      const hNum = homeMap[row.sub[0]]?.displayValue;
      const hDen = homeMap[row.sub[1]]?.displayValue;
      if (aNum !== undefined && aDen !== undefined) aSub = `(${aNum}/${aDen})`;
      if (hNum !== undefined && hDen !== undefined) hSub = `(${hNum}/${hDen})`;
    }
    const aRaw = rawNum(aStat, row.pct);
    const hRaw = rawNum(hStat, row.pct);
    const total = aRaw + hRaw;
    let aPct = 0, hPct = 0;
    if (total > 0) {
      aPct = (aRaw / total) * 100;
      hPct = (hRaw / total) * 100;
    }
    return `<div class="stats2-row">
      <div class="stats2-row-top">
        <div class="stats2-val-side">${aDisp}${aSub ? `<span class="sub">${aSub}</span>` : ''}</div>
        <div class="stats2-label">${row.label}</div>
        <div class="stats2-val-side right">${hDisp}${hSub ? `<span class="sub">${hSub}</span>` : ''}</div>
      </div>
      <div class="stats2-bars">
        <div class="stats2-bar-left" style="width:${aPct}%"></div>
        <div class="stats2-bar-right" style="width:${hPct}%"></div>
      </div>
    </div>`;
  }

  let html = '';
  STAT_SECTIONS.forEach(section => {
    const rows = section.rows.map(statRow).filter(Boolean).join('');
    if (rows) {
      html += `<div class="stats2-section">
        <div class="stats2-section-header">${section.name}</div>
        ${rows}
      </div>`;
    }
  });
  return html || `<div class="empty" style="min-height:80px"><div class="empty-sub">Stats appear after kickoff.</div></div>`;
}

function renderLineups(detail, m) {
  if (!detail) return loadingFragment('Loading lineups…');
  const rosters = detail.rosters || [];
  if (rosters.length === 0 || !rosters.some(r => r.roster && r.roster.length)) {
    return `<div class="empty" style="min-height:80px">
      <div class="empty-sub">Lineups appear ~1 hour before kickoff.</div>
    </div>`;
  }
  function renderTeam(r) {
    const team = r.team || {};
    const players = r.roster || [];
    const starters = players.filter(p => p.starter);
    const subs = players.filter(p => !p.starter);
    const formation = r.formation || '';
    return `<div class="lineup-team">
      <div class="lineup-team-header">
        ${team.shortDisplayName || team.displayName || '?'}
        ${formation ? `<span class="formation">${formation}</span>` : ''}
      </div>
      ${starters.map(p => playerRow(p)).join('')}
      ${subs.length ? `<div class="lineup-divider">Subs</div>` : ''}
      ${subs.slice(0, 6).map(p => playerRow(p)).join('')}
    </div>`;
  }
  function playerRow(p) {
    const a = p.athlete || {};
    return `<div class="lineup-player">
      <div class="lineup-player-num">${p.jersey || ''}</div>
      <div class="lineup-player-name">${a.shortName || a.displayName || '?'}</div>
      <div class="lineup-player-pos">${p.position?.abbreviation || ''}</div>
    </div>`;
  }
  return `<div class="lineup-section">${rosters.map(r => renderTeam(r)).join('')}</div>`;
}

function renderInfo(detail, m) {
  const gi = detail?.gameInfo || {};
  const refs = gi.officials || [];
  const refName = refs[0]?.fullName || 'TBD';

  return `<div class="info-list">
    <div class="info-row"><span class="info-label">Comp</span><span class="info-val">${m.leagueName}</span></div>
    <div class="info-row"><span class="info-label">Kickoff</span><span class="info-val">${formatTime(m.startISO)}</span></div>
    ${m.venue ? `<div class="info-row"><span class="info-label">Venue</span><span class="info-val">${m.venue}</span></div>` : ''}
    ${gi.attendance ? `<div class="info-row"><span class="info-label">Attend</span><span class="info-val">${gi.attendance.toLocaleString()}</span></div>` : ''}
    <div class="info-row"><span class="info-label">Referee</span><span class="info-val">${refName}</span></div>
    <div class="info-row"><span class="info-label">Away</span><span class="info-val">${m.away.full || m.away.name}</span></div>
    <div class="info-row"><span class="info-label">Home</span><span class="info-val">${m.home.full || m.home.name}</span></div>
    <div class="info-row"><span class="info-label">Status</span><span class="info-val">${m.statusDesc || m.statusDetail || 'Scheduled'}</span></div>
    ${detail?.standings ? renderStandingsSnippet(detail.standings) : ''}
  </div>`;
}

function renderStandingsSnippet(standings) {
  if (!standings?.groups?.[0]?.standings?.entries) return '';
  const entries = standings.groups[0].standings.entries.slice(0, 6);
  return `<div style="margin-top:8px">
    <div class="info-row" style="border-bottom:1px solid var(--orange);padding-bottom:3px">
      <span class="info-label">Standings (Top 6)</span>
    </div>
    <div class="standings-table">
      <div class="standings-row header"><span class="rank">#</span><span class="team">Team</span><span class="gp">GP</span><span class="gd">GD</span><span class="pts">PTS</span></div>
      ${entries.map((e, i) => {
        const team = e.team || {};
        const stats = e.stats || [];
        const getStat = (n) => stats.find(s => s.name === n)?.displayValue ?? '-';
        return `<div class="standings-row">
          <span class="rank">${i+1}</span>
          <span class="team">${team.shortDisplayName || team.abbreviation || '?'}</span>
          <span class="gp">${getStat('gamesPlayed')}</span>
          <span class="gd">${getStat('pointDifferential') || getStat('goalDifference') || '-'}</span>
          <span class="pts">${getStat('points')}</span>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function loadingFragment(text) {
  return `<div class="loading-state" style="min-height:120px"><div class="spinner-ball"></div><div class="empty-sub">${text}</div></div>`;
}

/* ── Competitions ── */

function renderCompList() {
  hideSubTabs();
  const liveByComp = {};
  S.matches.forEach(m => {
    if (m.status === 'in') liveByComp[m.leagueSlug] = (liveByComp[m.leagueSlug] || 0) + 1;
  });
  $('main').innerHTML = `<div class="comp-grid">
    ${LEAGUES.map((l, i) => `
      <div class="comp-card${i === S.focusIdx ? ' focused' : ''}" data-i="${i}" style="position:relative">
        ${liveByComp[l.slug] ? `<div class="comp-card-live">${liveByComp[l.slug]}</div>` : ''}
        <div class="comp-card-name">${l.name}</div>
        <div class="comp-card-region">${l.region}</div>
      </div>`).join('')}
  </div>`;
  document.querySelectorAll('.comp-card').forEach(c => {
    c.addEventListener('click', () => openComp(LEAGUES[parseInt(c.dataset.i)]));
  });
}

async function openComp(comp) {
  S.selectedComp = comp;
  S.view = 'compDetail';
  S.compSubTab = 0;
  S.compStandings = null;
  S.focusIdx = -1;
  render();
  // Fetch standings in background
  fetchStandings(comp.slug).then(s => {
    S.compStandings = s;
    if (S.view === 'compDetail' && S.compSubTab === 1) render();
  });
}

function renderCompDetail() {
  const c = S.selectedComp;
  if (!c) { goBack(); return; }
  renderSubTabs(COMP_SUBTABS, S.compSubTab, (i) => { S.compSubTab = i; render(); $('main').scrollTop = 0; });

  let html = `<div class="detail-back" id="backBtn">◀ ${c.name.toUpperCase()}</div>`;

  if (S.compSubTab === 0) {
    const list = S.matches.filter(x => x.leagueSlug === c.slug);
    if (list.length === 0) {
      html += `<div class="empty" style="min-height:80px">
        <div class="empty-icon">⚽</div>
        <div class="empty-sub">No matches today in ${c.name}.</div>
      </div>`;
    } else {
      html += groupedMatchList(list, false);
    }
  } else {
    html += renderFullStandings();
  }

  $('main').innerHTML = html;
  $('backBtn').addEventListener('click', goBack);

  if (S.compSubTab === 0) {
    const list = S.matches.filter(x => x.leagueSlug === c.slug);
    document.querySelectorAll('.match-row').forEach(row => {
      row.addEventListener('click', () => openMatchDetail(list[parseInt(row.dataset.idx)]));
    });
  }
}

function renderFullStandings() {
  if (!S.compStandings) return loadingFragment('Loading standings…');
  const groups = S.compStandings.children || [];
  if (groups.length === 0) {
    return `<div class="empty" style="min-height:80px">
      <div class="empty-sub">No standings available for this competition.</div>
    </div>`;
  }
  return groups.slice(0, 4).map(g => {
    const entries = g.standings?.entries || [];
    if (entries.length === 0) return '';
    return `<div style="margin:4px 0">
      <div class="comp-header"><div class="comp-name">${g.name || g.abbreviation || ''}</div></div>
      <div class="standings-table">
        <div class="standings-row header"><span class="rank">#</span><span class="team">Team</span><span class="gp">GP</span><span class="gd">GD</span><span class="pts">PTS</span></div>
        ${entries.map((e, i) => {
          const team = e.team || {};
          const stats = e.stats || [];
          const get = (n) => stats.find(s => s.name === n)?.displayValue ?? '-';
          return `<div class="standings-row">
            <span class="rank">${i+1}</span>
            <span class="team">${team.shortDisplayName || team.abbreviation || team.displayName || '?'}</span>
            <span class="gp">${get('gamesPlayed')}</span>
            <span class="gd">${get('pointDifferential') || get('goalDifference') || '-'}</span>
            <span class="pts">${get('points')}</span>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

function goBack() {
  if (S.view === 'matchDetail') {
    S.view = S._prevView || 'list';
    S.selectedMatch = null;
    S.matchDetail = null;
    hideSubTabs();
  } else if (S.view === 'compDetail') {
    S.view = 'compList';
    S.selectedComp = null;
    hideSubTabs();
  }
  render();
}

/* ══════════════════════════════════════
   INPUT
   ══════════════════════════════════════ */

function currentList() {
  if (S.view === 'list') {
    if (S.tabIdx === 0) return S.matches.filter(x => x.status === 'in');
    if (S.tabIdx === 1) return S.matches;
  }
  if (S.view === 'compDetail' && S.compSubTab === 0) {
    return S.matches.filter(x => x.leagueSlug === S.selectedComp?.slug);
  }
  return [];
}

function moveFocus(dir) {
  if (S.view === 'matchDetail') {
    $('main').scrollBy(0, dir * 40);
    return;
  }
  if (S.view === 'compList') {
    const max = LEAGUES.length;
    S.focusIdx = S.focusIdx < 0 ? 0 : Math.max(0, Math.min(S.focusIdx + dir, max - 1));
    render();
    document.querySelector(`.comp-card[data-i="${S.focusIdx}"]`)?.scrollIntoView({block:'nearest'});
    return;
  }
  if (S.view === 'compDetail' && S.compSubTab === 1) {
    $('main').scrollBy(0, dir * 40);
    return;
  }
  const list = currentList();
  if (list.length === 0) return;
  S.focusIdx = S.focusIdx < 0 ? 0 : Math.max(0, Math.min(S.focusIdx + dir, list.length - 1));
  applyFocus();
  document.querySelector(`.match-row[data-idx="${S.focusIdx}"]`)?.scrollIntoView({block:'nearest'});
}

function pttClick() {
  if (S.view === 'matchDetail') {
    // Cycle through sub-tabs
    S.matchSubTab = (S.matchSubTab + 1) % MATCH_SUBTABS.length;
    render(); $('main').scrollTop = 0;
    return;
  }
  if (S.view === 'compDetail') {
    if (S.compSubTab === 1) {
      // back from standings
      goBack(); return;
    }
    const list = currentList();
    if (list.length === 0 || S.focusIdx < 0) {
      S.compSubTab = (S.compSubTab + 1) % COMP_SUBTABS.length;
      render(); $('main').scrollTop = 0;
      return;
    }
    openMatchDetail(list[S.focusIdx]);
    return;
  }
  if (S.view === 'compList') {
    openComp(LEAGUES[Math.max(0, S.focusIdx)]);
    return;
  }
  const list = currentList();
  if (list.length === 0 || S.focusIdx < 0) {
    switchTab((S.tabIdx + 1) % TABS.length);
    return;
  }
  openMatchDetail(list[S.focusIdx]);
}

function longPress() {
  if (S.view === 'matchDetail' || S.view === 'compDetail') {
    goBack();
  } else {
    fetchAllMatches();
  }
}

window.addEventListener('scrollUp',   () => moveFocus(-1));
window.addEventListener('scrollDown', () => moveFocus(1));
window.addEventListener('sideClick',  () => pttClick());
window.addEventListener('longPressStart', () => longPress());

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowUp')        { moveFocus(-1); e.preventDefault(); }
  else if (e.key === 'ArrowDown') { moveFocus(1); e.preventDefault(); }
  else if (e.key === 'Enter' || e.key === ' ') { pttClick(); e.preventDefault(); }
  else if (e.key === 'Escape' || e.key === 'Backspace') {
    if (S.view !== 'list' && S.view !== 'compList') goBack(); else longPress();
    e.preventDefault();
  }
  else if (e.key === 'ArrowLeft')  {
    if (S.view === 'matchDetail') { S.matchSubTab = (S.matchSubTab - 1 + MATCH_SUBTABS.length) % MATCH_SUBTABS.length; render(); }
    else if (S.view === 'compDetail') { S.compSubTab = (S.compSubTab - 1 + COMP_SUBTABS.length) % COMP_SUBTABS.length; render(); }
    else switchTab((S.tabIdx - 1 + TABS.length) % TABS.length);
  }
  else if (e.key === 'ArrowRight') {
    if (S.view === 'matchDetail') { S.matchSubTab = (S.matchSubTab + 1) % MATCH_SUBTABS.length; render(); }
    else if (S.view === 'compDetail') { S.compSubTab = (S.compSubTab + 1) % COMP_SUBTABS.length; render(); }
    else switchTab((S.tabIdx + 1) % TABS.length);
  }
});

fetchAllMatches();
</script>
</body>
</html>
