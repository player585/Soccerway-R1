<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=240,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="version" content="2.0.1">
<title>Soccerway R1 v2.0.1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a1a0e;--surf:#0f2417;--surf2:#143020;--offset:#1a3a28;
  --div:#1f4631;--bord:#2a5d40;
  --txt:#e8ebe9;--muted:#7a9a82;--faint:#4a6a52;
  --green:#22c55e;--green-bright:#34d65f;--yellow:#fbbf24;--red:#ef4444;--blue:#3b82f6;--orange:#f97316;
  --mono:'JetBrains Mono',monospace;--body:'Inter',sans-serif;
  --xs:0.5625rem;--sm:0.625rem;--base:0.6875rem;--md:0.8125rem;--lg:0.9375rem;
  --r:0.375rem;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;-webkit-text-size-adjust:none}
body{font-family:var(--body);font-size:var(--base);color:var(--txt);background:var(--bg);
  height:100dvh;overflow:hidden;display:flex;flex-direction:column;max-width:240px;margin:0 auto}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding:4px 8px;
  background:var(--surf);border-bottom:1px solid var(--div);flex-shrink:0;min-height:24px}
.header-title{font-family:var(--mono);font-size:var(--sm);font-weight:700;letter-spacing:.02em;display:flex;align-items:center;gap:4px}
.header-title .ball{width:11px;height:11px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#fff 25%,#000 28% 35%,#fff 38%);border:1px solid #000;flex-shrink:0}
.header-title .name{color:var(--green-bright)}
.header-right{font-family:var(--mono);font-size:7px;color:var(--muted);display:flex;align-items:center;gap:4px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green-bright);animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Tabs */
.tabs{display:flex;background:var(--surf);border-bottom:1px solid var(--div);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;padding:4px 7px;font-family:var(--mono);font-size:var(--xs);font-weight:700;
  color:var(--faint);text-transform:uppercase;letter-spacing:.04em;border-bottom:2px solid transparent;
  cursor:pointer;white-space:nowrap;min-height:22px;display:flex;align-items:center;justify-content:center;gap:3px}
.tab.active{color:var(--green-bright);border-bottom-color:var(--green-bright)}
.tab-count{font-size:7px;background:var(--green-bright);color:var(--bg);padding:1px 4px;border-radius:8px;font-weight:700}

/* Content */
.main{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.main::-webkit-scrollbar{width:3px}
.main::-webkit-scrollbar-thumb{background:var(--bord);border-radius:9px}

/* Match cards */
.match-list{display:flex;flex-direction:column;gap:3px;padding:4px}
.match-card{background:var(--surf);border:1px solid var(--div);border-radius:var(--r);overflow:hidden;cursor:pointer;
  transition:all .12s;display:flex;flex-direction:column}
.match-card.focused{border-color:var(--green-bright);box-shadow:0 0 0 1px var(--green-bright)}
.match-header{display:flex;align-items:center;justify-content:space-between;padding:3px 6px;
  background:var(--surf2);border-bottom:1px solid var(--div);min-height:16px}
.match-league{font-family:var(--mono);font-size:7px;color:var(--faint);text-transform:uppercase;letter-spacing:.04em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.match-status{font-family:var(--mono);font-size:7px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:1px 4px;border-radius:8px;white-space:nowrap;flex-shrink:0;margin-left:4px}
.match-status.live{background:color-mix(in oklch,var(--green-bright) 20%,transparent);color:var(--green-bright)}
.match-status.ft{background:color-mix(in oklch,var(--faint) 20%,transparent);color:var(--muted)}
.match-status.sched{background:color-mix(in oklch,var(--blue) 20%,transparent);color:var(--blue)}
.match-status.ht{background:color-mix(in oklch,var(--yellow) 20%,transparent);color:var(--yellow)}

.team-row{display:flex;align-items:center;padding:4px 6px;gap:6px}
.team-row.winner .team-name{color:var(--txt);font-weight:700}
.team-row.winner .team-score{color:var(--green-bright)}
.team-flag{width:14px;height:14px;border-radius:2px;background:var(--offset);flex-shrink:0;font-size:9px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.team-flag img{width:100%;height:100%;object-fit:cover}
.team-name{flex:1;font-family:var(--body);font-size:var(--sm);font-weight:500;color:var(--muted);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.team-score{font-family:var(--mono);font-size:var(--md);font-weight:700;color:var(--muted);min-width:18px;text-align:right}
.team-row + .team-row{border-top:1px solid color-mix(in oklch,var(--div) 50%,transparent)}

/* Empty / Loading */
.empty,.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:20px 12px;gap:6px;text-align:center;min-height:160px}
.empty-icon{font-size:32px;opacity:.5}
.empty-title{font-family:var(--mono);font-size:var(--sm);color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.empty-sub{font-family:var(--mono);font-size:var(--xs);color:var(--faint);max-width:200px;line-height:1.5}
.spinner-ball{width:22px;height:22px;border-radius:50%;
  background:radial-gradient(circle at 30% 30%,#fff 25%,#000 28% 35%,#fff 38%);
  border:1.5px solid #000;animation:spin 1.2s linear infinite}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

/* Skeleton card */
.skel{height:48px;background:linear-gradient(90deg,var(--surf) 25%,var(--surf2) 50%,var(--surf) 75%);
  background-size:200% 100%;animation:shimmer 1.5s ease-in-out infinite;border-radius:var(--r);margin:3px 4px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* League selector */
.league-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px;padding:4px}
.league-card{background:var(--surf);border:1px solid var(--div);border-radius:var(--r);padding:6px 4px;
  text-align:center;cursor:pointer;transition:all .12s;display:flex;flex-direction:column;gap:2px;
  min-height:44px;align-items:center;justify-content:center}
.league-card.focused{border-color:var(--green-bright);box-shadow:0 0 0 1px var(--green-bright)}
.league-card-name{font-family:var(--mono);font-size:var(--xs);font-weight:700;color:var(--txt);line-height:1.2}
.league-card-region{font-family:var(--mono);font-size:7px;color:var(--faint);text-transform:uppercase;letter-spacing:.04em}

/* Match detail */
.detail-back{display:flex;align-items:center;gap:6px;padding:5px 8px;background:var(--surf2);
  border-bottom:1px solid var(--div);font-family:var(--mono);font-size:var(--xs);color:var(--green-bright);
  font-weight:700;cursor:pointer;min-height:22px}
.detail-scoreboard{padding:8px;background:var(--surf);border-bottom:1px solid var(--div)}
.detail-league{font-family:var(--mono);font-size:7px;color:var(--faint);text-transform:uppercase;text-align:center;margin-bottom:4px}
.detail-teams{display:flex;align-items:center;justify-content:space-around;padding:6px 0}
.detail-team{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;min-width:0}
.detail-team-flag{width:24px;height:24px;border-radius:50%;background:var(--offset);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px}
.detail-team-flag img{width:100%;height:100%;object-fit:cover}
.detail-team-name{font-family:var(--mono);font-size:var(--xs);font-weight:700;color:var(--txt);
  text-align:center;line-height:1.2;max-width:80px;word-break:break-word}
.detail-team-score{font-family:var(--mono);font-size:var(--lg);font-weight:700;color:var(--green-bright)}
.detail-vs{font-family:var(--mono);font-size:var(--md);font-weight:700;color:var(--faint)}
.detail-status{text-align:center;font-family:var(--mono);font-size:var(--sm);font-weight:700;color:var(--green-bright);margin-top:4px}
.detail-info{padding:6px 8px;font-family:var(--mono);font-size:var(--xs);color:var(--muted);line-height:1.4}
.detail-row{display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid color-mix(in oklch,var(--div) 30%,transparent)}
.detail-row:last-child{border-bottom:none}
.detail-row-label{color:var(--faint);text-transform:uppercase;font-size:7px;letter-spacing:.04em}
.detail-row-val{color:var(--txt);font-weight:600;text-align:right}

/* Refresh button area */
.refresh-row{display:flex;align-items:center;justify-content:center;padding:6px;
  font-family:var(--mono);font-size:var(--xs);color:var(--faint);gap:6px;border-top:1px solid var(--div);
  background:var(--surf);cursor:pointer}
.refresh-row.refreshing{color:var(--green-bright)}

/* Footer */
.footer{display:flex;align-items:center;justify-content:space-between;padding:2px 8px;
  background:var(--surf);border-top:1px solid var(--div);flex-shrink:0;min-height:16px;font-family:var(--mono);font-size:7px}
.footer-left{color:var(--faint)}
.footer-mid{flex:1;text-align:center;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 4px}
.footer-right{color:var(--green-bright);display:flex;align-items:center;gap:3px}
.footer-right .countdown{color:var(--muted);min-width:18px;text-align:right}

/* Hint */
.prompt{padding:4px 8px;text-align:center;font-family:var(--mono);font-size:7px;color:var(--faint);background:var(--surf);border-top:1px solid var(--div);flex-shrink:0}
.prompt-ptt{color:var(--green-bright)}
.prompt-scroll{color:var(--blue)}
</style>
</head>
<body>

<header class="header">
  <div class="header-title">
    <div class="ball"></div>
    <span class="name">SOCCERWAY</span>
  </div>
  <div class="header-right">
    <span class="live-dot"></span>
    <span id="liveCount">—</span>
  </div>
</header>

<nav class="tabs" id="tabs"></nav>

<main class="main" id="main"></main>

<div class="prompt">
  <span class="prompt-scroll">SCROLL</span> · <span class="prompt-ptt">PTT</span> open · LONG refresh
</div>

<footer class="footer">
  <span class="footer-left" id="footerLeft">v2.0.1</span>
  <span class="footer-mid" id="footerMid">Loading…</span>
  <span class="footer-right"><span id="countdown">30s</span></span>
</footer>

<script>
/* ══════════════════════════════════════
   SOCCERWAY R1 v2 — Native Scores via ESPN API
   ══════════════════════════════════════ */

const API = 'https://site.api.espn.com/apis/site/v2/sports/soccer';

const LEAGUES = [
  {slug:'fifa.world',name:'World Cup',region:'FIFA'},
  {slug:'fifa.cwc',name:'Club WC',region:'FIFA'},
  {slug:'fifa.confederations',name:'Confed Cup',region:'FIFA'},
  {slug:'fifa.womens.world',name:'W. World Cup',region:'FIFA'},
  {slug:'uefa.champions',name:'UCL',region:'UEFA'},
  {slug:'uefa.europa',name:'UEL',region:'UEFA'},
  {slug:'uefa.euro',name:'Euros',region:'UEFA'},
  {slug:'uefa.nations',name:'Nations',region:'UEFA'},
  {slug:'conmebol.copa_america',name:'Copa Amer.',region:'CONMEBOL'},
  {slug:'concacaf.gold',name:'Gold Cup',region:'CONCACAF'},
  {slug:'eng.1',name:'Premier',region:'England'},
  {slug:'eng.fa',name:'FA Cup',region:'England'},
  {slug:'eng.league_cup',name:'Carabao',region:'England'},
  {slug:'esp.1',name:'La Liga',region:'Spain'},
  {slug:'ita.1',name:'Serie A',region:'Italy'},
  {slug:'ger.1',name:'Bundesliga',region:'Germany'},
  {slug:'fra.1',name:'Ligue 1',region:'France'},
  {slug:'usa.1',name:'MLS',region:'USA'},
  {slug:'usa.nwsl',name:'NWSL',region:'USA'},
  {slug:'mex.1',name:'Liga MX',region:'Mexico'},
  {slug:'bra.1',name:'Brasileirão',region:'Brazil'},
  {slug:'arg.1',name:'Primera',region:'Argentina'}
];

const TABS = [
  {id:'live',    label:'LIVE'},
  {id:'today',   label:'TODAY'},
  {id:'leagues', label:'LEAGUES'}
];

let S = {
  tabIdx: 0,
  matches: [],       // all matches across leagues
  loading: true,
  focusIdx: -1,
  view: 'list',      // 'list' | 'detail' | 'leagueList' | 'leagueDetail'
  selectedMatch: null,
  selectedLeague: null,
  countdown: 30,
  countdownTimer: null,
  refreshing: false,
  lastUpdate: 0,
  leagueFocusIdx: 0
};

const $ = id => document.getElementById(id);

/* ══════════════════════════════════════
   FETCH
   ══════════════════════════════════════ */

async function fetchLeague(slug) {
  try {
    const r = await fetch(`${API}/${slug}/scoreboard`);
    if (!r.ok) return [];
    const data = await r.json();
    const leagueName = LEAGUES.find(l => l.slug === slug)?.name || slug;
    return (data.events || []).map(ev => {
      const comp = (ev.competitions || [{}])[0];
      const status = comp.status?.type || {};
      const teams = comp.competitors || [];
      const home = teams.find(t => t.homeAway === 'home') || teams[0] || {};
      const away = teams.find(t => t.homeAway === 'away') || teams[1] || {};
      return {
        id: ev.id,
        leagueSlug: slug,
        leagueName: leagueName,
        startISO: comp.date || ev.date,
        venue: comp.venue?.fullName,
        status: status.state, // 'pre','in','post'
        statusDetail: status.shortDetail || '',
        statusDesc: status.description || '',
        completed: status.completed,
        clock: comp.status?.displayClock,
        period: comp.status?.period,
        home: {
          id: home.id,
          name: home.team?.shortDisplayName || home.team?.displayName || '?',
          full: home.team?.displayName || '',
          score: home.score || '0',
          logo: home.team?.logo,
          winner: home.winner
        },
        away: {
          id: away.id,
          name: away.team?.shortDisplayName || away.team?.displayName || '?',
          full: away.team?.displayName || '',
          score: away.score || '0',
          logo: away.team?.logo,
          winner: away.winner
        }
      };
    });
  } catch(e) { return []; }
}

async function fetchAllMatches() {
  S.loading = true;
  S.refreshing = true;
  updateFooter();
  render();

  // Parallel fetch
  const results = await Promise.all(LEAGUES.map(l => fetchLeague(l.slug)));
  S.matches = results.flat();

  // Sort: live first, then scheduled (by time), then completed
  S.matches.sort((a, b) => {
    const order = {in:0, pre:1, post:2};
    const oa = order[a.status] ?? 3;
    const ob = order[b.status] ?? 3;
    if (oa !== ob) return oa - ob;
    return new Date(a.startISO) - new Date(b.startISO);
  });

  S.lastUpdate = Date.now();
  S.loading = false;
  S.refreshing = false;
  updateLiveCount();
  resetCountdown();
  render();
}

function updateLiveCount() {
  const liveCount = S.matches.filter(m => m.status === 'in').length;
  $('liveCount').textContent = liveCount > 0 ? `${liveCount} LIVE` : 'NO LIVE';
}

function updateFooter() {
  const tabId = TABS[S.tabIdx].id;
  let count = 0;
  if (tabId === 'live') count = S.matches.filter(m => m.status === 'in').length;
  else if (tabId === 'today') count = S.matches.length;
  else if (tabId === 'leagues') count = LEAGUES.length;
  $('footerMid').textContent = S.refreshing ? 'Refreshing…' :
    S.loading ? 'Loading…' :
    `${count} ${tabId === 'leagues' ? 'leagues' : 'matches'}`;
}

function resetCountdown() {
  clearInterval(S.countdownTimer);
  S.countdown = 30;
  $('countdown').textContent = S.countdown + 's';
  S.countdownTimer = setInterval(() => {
    S.countdown--;
    $('countdown').textContent = S.countdown + 's';
    if (S.countdown <= 0) {
      clearInterval(S.countdownTimer);
      fetchAllMatches();
    }
  }, 1000);
}

/* ══════════════════════════════════════
   RENDER
   ══════════════════════════════════════ */

function renderTabs() {
  const liveCount = S.matches.filter(m => m.status === 'in').length;
  $('tabs').innerHTML = TABS.map((t, i) => {
    const showCount = t.id === 'live' && liveCount > 0;
    return `
      <div class="tab${i === S.tabIdx ? ' active' : ''}" data-i="${i}">
        ${t.label}
        ${showCount ? `<span class="tab-count">${liveCount}</span>` : ''}
      </div>`;
  }).join('');
  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => switchTab(parseInt(t.dataset.i)));
  });
}

function switchTab(idx) {
  S.tabIdx = idx;
  S.focusIdx = -1;
  S.view = TABS[idx].id === 'leagues' ? 'leagueList' : 'list';
  S.leagueFocusIdx = 0;
  render();
  $('main').scrollTop = 0;
}

function formatTime(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    return d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
  } catch(e) { return ''; }
}

function matchCard(m, idx) {
  let statusCls = 'sched';
  let statusText = formatTime(m.startISO);
  if (m.status === 'in') {
    statusCls = m.statusDesc === 'Halftime' ? 'ht' : 'live';
    statusText = m.statusDetail || (m.clock ? `${m.period}'${m.clock}` : 'LIVE');
  } else if (m.status === 'post') {
    statusCls = 'ft';
    statusText = m.statusDetail || 'FT';
  }
  const flagFor = (t) => t.logo
    ? `<img src="${t.logo}" alt="" loading="lazy" onerror="this.style.display='none'"/>`
    : '⚽';
  const aRow = `<div class="team-row${m.away.winner?' winner':''}">
      <div class="team-flag">${flagFor(m.away)}</div>
      <div class="team-name">${m.away.name}</div>
      <div class="team-score">${m.status==='pre'?'-':m.away.score}</div>
    </div>`;
  const hRow = `<div class="team-row${m.home.winner?' winner':''}">
      <div class="team-flag">${flagFor(m.home)}</div>
      <div class="team-name">${m.home.name}</div>
      <div class="team-score">${m.status==='pre'?'-':m.home.score}</div>
    </div>`;
  return `<div class="match-card${idx === S.focusIdx ? ' focused' : ''}" data-idx="${idx}">
    <div class="match-header">
      <div class="match-league">${m.leagueName}</div>
      <div class="match-status ${statusCls}">${statusText}</div>
    </div>
    ${aRow}${hRow}
  </div>`;
}

function render() {
  const m = $('main');
  renderTabs();
  updateFooter();
  $('footerLeft').textContent = 'v2.0.1';

  if (S.loading && S.matches.length === 0) {
    m.innerHTML = `
      <div class="loading-state">
        <div class="spinner-ball"></div>
        <div class="empty-title">Loading scores</div>
        <div class="empty-sub">Fetching from ${LEAGUES.length} leagues…</div>
      </div>`;
    return;
  }

  if (S.view === 'detail') {
    renderDetail();
    return;
  }

  if (S.view === 'leagueList') {
    renderLeagueList();
    return;
  }

  if (S.view === 'leagueDetail') {
    renderLeagueDetail();
    return;
  }

  // List view: filter by tab
  let list = [];
  if (S.tabIdx === 0) list = S.matches.filter(x => x.status === 'in');
  else if (S.tabIdx === 1) list = S.matches;

  if (list.length === 0) {
    const tabName = TABS[S.tabIdx].label.toLowerCase();
    m.innerHTML = `
      <div class="empty">
        <div class="empty-icon">⚽</div>
        <div class="empty-title">No ${tabName} matches</div>
        <div class="empty-sub">${S.tabIdx === 0 ? "Nothing's kicking off right now. Check back during match windows or browse Today." : 'No matches across the leagues we track today.'}</div>
      </div>`;
    return;
  }

  m.innerHTML = `<div class="match-list">${list.map((mt, i) => matchCard(mt, i)).join('')}</div>`;
  document.querySelectorAll('.match-card').forEach(card => {
    card.addEventListener('click', () => openDetail(list[parseInt(card.dataset.idx)]));
  });

  // Auto-focus first match if nothing focused
  if (S.focusIdx < 0 && list.length > 0) {
    S.focusIdx = 0;
    setTimeout(() => {
      document.querySelector(`.match-card[data-idx="0"]`)?.classList.add('focused');
    }, 0);
  }
}

function renderLeagueList() {
  const m = $('main');
  m.innerHTML = `<div class="league-grid">${LEAGUES.map((l, i) => `
    <div class="league-card${i === S.leagueFocusIdx ? ' focused' : ''}" data-li="${i}">
      <div class="league-card-name">${l.name}</div>
      <div class="league-card-region">${l.region}</div>
    </div>`).join('')}</div>`;
  document.querySelectorAll('.league-card').forEach(c => {
    c.addEventListener('click', () => openLeague(LEAGUES[parseInt(c.dataset.li)]));
  });
}

function renderLeagueDetail() {
  const m = $('main');
  const list = S.matches.filter(x => x.leagueSlug === S.selectedLeague.slug);
  if (list.length === 0) {
    m.innerHTML = `
      <div class="detail-back" id="backBtn">◀ LEAGUES</div>
      <div class="empty">
        <div class="empty-icon">⚽</div>
        <div class="empty-title">${S.selectedLeague.name}</div>
        <div class="empty-sub">No matches scheduled for today.</div>
      </div>`;
  } else {
    m.innerHTML = `
      <div class="detail-back" id="backBtn">◀ ${S.selectedLeague.name.toUpperCase()}</div>
      <div class="match-list">${list.map((mt, i) => matchCard(mt, i)).join('')}</div>`;
    document.querySelectorAll('.match-card').forEach(card => {
      card.addEventListener('click', () => openDetail(list[parseInt(card.dataset.idx)]));
    });
  }
  $('backBtn').addEventListener('click', () => {
    S.view = 'leagueList'; S.selectedLeague = null; S.focusIdx = -1; render();
  });
}

function renderDetail() {
  const m = $('main');
  const mt = S.selectedMatch;
  if (!mt) { S.view = 'list'; render(); return; }
  let statusCls = 'sched';
  let statusText = formatTime(mt.startISO);
  if (mt.status === 'in') {
    statusCls = 'live';
    statusText = mt.statusDetail || 'LIVE';
  } else if (mt.status === 'post') {
    statusCls = 'ft';
    statusText = mt.statusDetail || 'FT';
  }
  const flagFor = (t) => t.logo
    ? `<img src="${t.logo}" alt="" onerror="this.style.display='none'"/>`
    : '⚽';
  m.innerHTML = `
    <div class="detail-back" id="backBtn">◀ BACK</div>
    <div class="detail-scoreboard">
      <div class="detail-league">${mt.leagueName}</div>
      <div class="detail-teams">
        <div class="detail-team">
          <div class="detail-team-flag">${flagFor(mt.away)}</div>
          <div class="detail-team-name">${mt.away.name}</div>
          <div class="detail-team-score">${mt.status==='pre'?'-':mt.away.score}</div>
        </div>
        <div class="detail-vs">${mt.status==='pre'?'vs':'-'}</div>
        <div class="detail-team">
          <div class="detail-team-flag">${flagFor(mt.home)}</div>
          <div class="detail-team-name">${mt.home.name}</div>
          <div class="detail-team-score">${mt.status==='pre'?'-':mt.home.score}</div>
        </div>
      </div>
      <div class="detail-status" style="color:${statusCls==='live'?'var(--green-bright)':statusCls==='ft'?'var(--muted)':'var(--blue)'}">${statusText}</div>
    </div>
    <div class="detail-info">
      <div class="detail-row"><span class="detail-row-label">Kickoff</span><span class="detail-row-val">${formatTime(mt.startISO)}</span></div>
      ${mt.venue ? `<div class="detail-row"><span class="detail-row-label">Venue</span><span class="detail-row-val">${mt.venue}</span></div>` : ''}
      <div class="detail-row"><span class="detail-row-label">Away</span><span class="detail-row-val">${mt.away.full || mt.away.name}</span></div>
      <div class="detail-row"><span class="detail-row-label">Home</span><span class="detail-row-val">${mt.home.full || mt.home.name}</span></div>
      <div class="detail-row"><span class="detail-row-label">Status</span><span class="detail-row-val">${mt.statusDesc || statusText}</span></div>
    </div>
    <div class="refresh-row" id="webBtn">
      🌐 Open on Soccerway.com
    </div>`;
  $('backBtn').addEventListener('click', goBack);
  $('webBtn').addEventListener('click', () => {
    window.open('https://us.soccerway.com/', '_blank');
  });
}

function openDetail(mt) {
  S.selectedMatch = mt;
  S._prevView = S.view;
  S.view = 'detail';
  render();
  $('main').scrollTop = 0;
}

function openLeague(l) {
  S.selectedLeague = l;
  S.view = 'leagueDetail';
  S.focusIdx = -1;
  render();
  $('main').scrollTop = 0;
}

function goBack() {
  if (S.view === 'detail') {
    S.view = S._prevView || 'list';
    S.selectedMatch = null;
  } else if (S.view === 'leagueDetail') {
    S.view = 'leagueList';
    S.selectedLeague = null;
  }
  render();
}

/* ══════════════════════════════════════
   INPUT HANDLERS
   ══════════════════════════════════════ */

function currentList() {
  if (S.view === 'list') {
    if (S.tabIdx === 0) return S.matches.filter(x => x.status === 'in');
    if (S.tabIdx === 1) return S.matches;
  }
  if (S.view === 'leagueDetail') {
    return S.matches.filter(x => x.leagueSlug === S.selectedLeague?.slug);
  }
  return [];
}

function moveFocus(dir) {
  if (S.view === 'detail') {
    // Scroll detail
    $('main').scrollBy(0, dir * 40);
    return;
  }
  if (S.view === 'leagueList') {
    const max = LEAGUES.length;
    S.leagueFocusIdx = Math.max(0, Math.min(S.leagueFocusIdx + dir, max - 1));
    render();
    const fc = document.querySelector(`.league-card[data-li="${S.leagueFocusIdx}"]`);
    fc?.scrollIntoView({block:'nearest', behavior:'auto'});
    return;
  }
  const list = currentList();
  if (list.length === 0) return;
  S.focusIdx = Math.max(0, Math.min(S.focusIdx + dir, list.length - 1));
  render();
  const fc = document.querySelector(`.match-card[data-idx="${S.focusIdx}"]`);
  fc?.scrollIntoView({block:'nearest', behavior:'auto'});
}

function pttClick() {
  if (S.view === 'detail') {
    goBack();
    return;
  }
  if (S.view === 'leagueList') {
    openLeague(LEAGUES[S.leagueFocusIdx]);
    return;
  }
  const list = currentList();
  if (list.length === 0 || S.focusIdx < 0) {
    // Cycle tabs if no focus
    switchTab((S.tabIdx + 1) % TABS.length);
    return;
  }
  openDetail(list[S.focusIdx]);
}

function longPress() {
  // Refresh
  fetchAllMatches();
}

/* ── R1 hardware ── */
window.addEventListener('scrollUp',   () => moveFocus(-1));
window.addEventListener('scrollDown', () => moveFocus(1));
window.addEventListener('sideClick',  () => pttClick());
window.addEventListener('longPressStart', () => longPress());

/* ── Keyboard fallbacks ── */
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowUp')        { moveFocus(-1); e.preventDefault(); }
  else if (e.key === 'ArrowDown') { moveFocus(1); e.preventDefault(); }
  else if (e.key === 'Enter' || e.key === ' ') { pttClick(); e.preventDefault(); }
  else if (e.key === 'Escape' || e.key === 'Backspace') {
    if (S.view !== 'list') goBack(); else longPress();
    e.preventDefault();
  }
  else if (e.key === 'ArrowLeft')  { switchTab((S.tabIdx - 1 + TABS.length) % TABS.length); }
  else if (e.key === 'ArrowRight') { switchTab((S.tabIdx + 1) % TABS.length); }
});

/* ── Init ── */
fetchAllMatches();
</script>
</body>
</html>
